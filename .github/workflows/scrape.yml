name: scrape

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Clone data branch as worktree
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf public/data
          if git ls-remote --heads "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data | grep -q data; then
            git clone --depth 50 --branch data \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" public/data
          else
            mkdir -p public/data
            cd public/data
            git init -q -b data
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

      - name: Run scraper
        run: node --max-old-space-size=8192 scripts/ingest-questionbank.mjs

      - name: Publish to data branch
        run: |
          set -euo pipefail
          cd public/data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -q -m "scrape $(date -u +%FT%TZ)"
          git push origin HEAD:data
